<nav class="navbar" *ngIf="shouldShowNavbar()">
  <div class="navbar-brand">
    <span class="material-icons">assignment</span>
    Gestion des Assignments
  </div>
  <div class="navbar-actions">
    <!-- Nouveau bouton Profil -->
    <button class="btn-profile" routerLink="/profile" title="Mon Profil">
      <div class="profile-avatar-small">
        {{ auth.getUsername().substring(0,1).toUpperCase() }}
      </div>
      <span>{{ auth.getUsername() }}</span>
    </button>

    <div class="divider"></div>

    <button class="btn-logout" (click)="onLogout()">
      <span class="material-icons">logout</span>
      Déconnexion
    </button>
  </div>
</nav>

<div class="main-container">
  <router-outlet></router-outlet>
</div>

<!-- Notification SnackBar (Material-like) -->
<div class="snackbar-container" *ngIf="notification">
  <div class="snackbar" [ngClass]="'snackbar-' + notification.type">
    <span class="material-icons">
      {{ notification.type === 'success' ? 'check_circle' : notification.type === 'error' ? 'error' : 'info' }}
    </span>
    <span class="snackbar-message">{{ notification.message }}</span>
  </div>
</div>
