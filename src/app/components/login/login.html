<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="app-icon">
        <span class="material-icons" style="font-size: 56px; color: #2563eb;">assignment</span>
      </div>
      <h1>Portail Assignments</h1>
      <p>Gérez vos devoirs en toute simplicité</p>
    </div>

    <form (submit)="login(); $event.preventDefault()">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-with-icon">
          <span class="material-icons">person</span>
          <input
            [(ngModel)]="username"
            name="username"
            id="username"
            placeholder="admin, user..."
            type="text"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-with-icon">
          <span class="material-icons">lock</span>
          <div class="password-wrapper">
            <input
              [(ngModel)]="password"
              name="password"
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              required
            >
            <button
              type="button"
              class="toggle-password"
              (click)="togglePassword()"
              [title]="showPassword ? 'Cacher' : 'Afficher'"
            >
              <span class="material-icons" style="font-size: 20px;">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <span class="material-icons" style="font-size: 20px;">login</span>
        <span>Se connecter</span>
      </button>

      <div class="error-message" *ngIf="error">
        <span class="material-icons" style="font-size: 18px;">error_outline</span>
        {{ error }}
      </div>

      <div class="login-footer">
        Système de Gestion des Assignments &copy; 2024
      </div>
    </form>
  </div>
</div>
